apiVersion: batch/v1
kind: Job
metadata:
  name: zot-answer-extraction
  namespace: poc-zot-answer
  labels:
    app: zot-answer
    autopoc.io/project: zot-answer
    autopoc.io/scenario: question-extraction
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 60
  template:
    spec:
      containers:
        - name: zot-answer
          image: quay.io/aicatalyst/zot-answer:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              printf '{"type":"hello_ack"}\n{"type":"command_invoked","id":"test-1","name":"answer","args":"1. What is AI? 2. What is ML? 3. What is DL?"}\n{"type":"shutdown"}\n' | timeout 15 npx tsx /opt/app-root/src/index.ts || true
              echo "EXIT_CODE=$?"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
